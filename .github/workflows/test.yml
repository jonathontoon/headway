name: test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify headway.sh matches src/*.sh
        run: make verify

  test:
    runs-on: ubuntu-latest
    container: alpine:3.20
    strategy:
      matrix:
        shell: [dash, ash]
    steps:
      - name: Install dash
        run: apk add --no-cache git dash

      - uses: actions/checkout@v4

      - name: Run test suite under ${{ matrix.shell }}
        run: ${{ matrix.shell }} tests/run.sh

  correctness-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run test suite under bash
        run: bash tests/run.sh

      - name: Run test suite under sh
        run: sh tests/run.sh
